spring:
  application:
    name: mcp-server-generic
server:
  port: 8080

integrations:
  gmail:
    enabled: false
    base-url: https://gmail.googleapis.com/gmail/v1
    user-id: me
    access-token: ""
  news:
    enabled: false
    connect-timeout-ms: 8000
    read-timeout-ms: 15000
    max-retries: 2
    max-concurrent-sources: 4
    blocked-hosts:
      - pinterest.com
      - instagram.com
      - facebook.com
    sources:
      - id: pinterest
        url: https://www.pinterest.com/news.rss
        type: RSS
        enabled: false
        auth: NONE
      - id: toi
        url: https://timesofindia.indiatimes.com/rssfeedstopstories.cms
        type: RSS
        enabled: true
        auth: NONE
      - id: github
        url: https://api.github.com/repos/spring-projects/spring-boot/issues
        type: JSON
        enabled: false
        auth: HEADER
        auth-header: Authorization
        auth-token: ""
        query-param: q
      - id: world-times
        url: https://example.com/world-times-feed
        type: ATOM
        enabled: false
        auth: BEARER
        auth-token: ""
        query-param: q
