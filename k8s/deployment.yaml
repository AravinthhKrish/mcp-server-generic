apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-generic
  labels:
    app: mcp-server-generic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-server-generic
  template:
    metadata:
      labels:
        app: mcp-server-generic
    spec:
      containers:
        - name: mcp-server-generic
          image: mcp-server-generic:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          readinessProbe:
            httpGet:
              path: /mcp/resources/system/provider-health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /mcp/resources/system/provider-health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
